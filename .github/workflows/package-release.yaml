name: Package and Release

on:
  push:
    tags:
      - "*"
  workflow_dispatch:

permissions:
  packages: write
  contents: write

jobs:
  all:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: geodepot-linux
            platform_id: linux
          - os: windows-latest
            artifact_name: geodepot-win
            platform_id: windows
          - os: macos-latest
            artifact_name: geodepot-macos
            platform_id: macos

    steps:
      - uses: actions/checkout@v6

      - if: runner.os == 'Windows'
        name: Install wget on Windows
        run: choco install wget

      - uses: prefix-dev/setup-pixi@v0.9.4
        with:
          manifest-path: pyproject.toml
          environments: >-
            default
            dev
          activate-environment: dev
          locked: true
          cache: true

      - if: runner.os != 'Windows'
        name: Normalize runner architecture non-Windows
        run: |
          case "$RUNNER_ARCH" in
            X64) echo "GEODEPOT_ARCH=x86_64" >> "$GITHUB_ENV" ;;
            ARM64) echo "GEODEPOT_ARCH=arm64" >> "$GITHUB_ENV" ;;
            *) echo "Unsupported runner architecture: $RUNNER_ARCH" >&2; exit 1 ;;
          esac

      - if: runner.os == 'Windows'
        name: Normalize runner architecture Windows
        run: |
          switch ($env:RUNNER_ARCH) {
            'X64' { 'GEODEPOT_ARCH=x86_64' | Out-File -FilePath $env:GITHUB_ENV -Append }
            'ARM64' { 'GEODEPOT_ARCH=arm64' | Out-File -FilePath $env:GITHUB_ENV -Append }
            default { throw "Unsupported runner architecture: $env:RUNNER_ARCH" }
          }

      - name: Download test data
        run: pixi run -e dev download-data

      - name: Test if GDAL imports
        run: python -c "import osgeo"

      - name: Lint
        run: pixi run -e dev lint

      - name: Format
        run: pixi run -e dev format-check

      - name: Run unit tests
        run: pixi run -e dev test

      - name: Build geodepot package
        run: pixi build --path pyproject.toml --output-dir build/conda

      - if: runner.os != 'Windows'
        name: Store built package path non-Windows
        run: echo "GEODEPOT_CONDA=$(echo build/conda/geodepot-*.conda)" >> "$GITHUB_ENV"

      - if: runner.os == 'Windows'
        name: Store built package path Windows
        run: echo "GEODEPOT_CONDA=$(Resolve-Path 'build/conda/geodepot-*.conda')" >> $env:GITHUB_ENV

      - if: runner.os != 'Windows'
        name: Create release bundle non-Windows
        run: |
          mkdir -p dist/geodepot
          pixi exec --spec pixi-pack -- pixi-pack --environment default --inject "$GEODEPOT_CONDA" --output-file dist/environment.tar pyproject.toml
          cd dist/geodepot
          pixi exec --spec pixi-unpack -- pixi-unpack ../environment.tar
          # The wrapper starts Geodepot directly; the generated activation scripts
          # are not needed and may contain build-path references.
          rm -rf activate* deactivate*
          install -m 755 ../../packaging/pixi/geodepot.sh ./geodepot

      - if: runner.os == 'Windows'
        name: Create release bundle Windows
        run: |
          New-Item -ItemType Directory -Force dist\geodepot | Out-Null
          pixi exec --spec pixi-pack -- pixi-pack --environment default --inject "$env:GEODEPOT_CONDA" --output-file dist/environment.tar pyproject.toml
          Push-Location dist\geodepot
          pixi exec --spec pixi-unpack -- pixi-unpack ..\environment.tar
          # The wrapper starts Geodepot directly; the generated activation scripts
          # are not needed and may contain build-path references.
          Remove-Item -Recurse -Force activate*, deactivate* -ErrorAction SilentlyContinue
          Pop-Location
          Copy-Item packaging\pixi\geodepot.cmd dist\geodepot\geodepot.cmd
          Copy-Item packaging\pixi\geodepot.ps1 dist\geodepot\geodepot.ps1

      - if: runner.os == 'Linux'
        name: Add installer scripts to dist
        run: |
          cp packaging/install/geodepot-install.sh dist/geodepot-install.sh
          cp packaging/install/geodepot-install.ps1 dist/geodepot-install.ps1
          chmod 755 dist/geodepot-install.sh

      - name: Add license documentation to bundle
        run: cp THIRD_PARTY_LICENSES.md dist/geodepot/THIRD_PARTY_LICENSES.md

      - name: Audit bundle dependencies
        run: python packaging/ci/check_bundle_self_contained.py dist/geodepot

      - if: runner.os != 'Windows'
        name: Smoke test bundle non-Windows
        run: |
          rm -rf smoke/relocated
          mkdir -p smoke/relocated
          cp -R "${GITHUB_WORKSPACE}/dist/geodepot" "${GITHUB_WORKSPACE}/smoke/relocated/geodepot"
          env -u CONDA_PREFIX -u CONDA_DEFAULT_ENV -u PYTHONPATH -u PROJ_LIB -u PROJ_DATA -u GDAL_DATA "${GITHUB_WORKSPACE}/smoke/relocated/geodepot/geodepot" --help
          rm -rf smoke/repo
          mkdir -p smoke/repo
          cd smoke/repo
          env -u CONDA_PREFIX -u CONDA_DEFAULT_ENV -u PYTHONPATH -u PROJ_LIB -u PROJ_DATA -u GDAL_DATA "${GITHUB_WORKSPACE}/smoke/relocated/geodepot/geodepot" init
          env -u CONDA_PREFIX -u CONDA_DEFAULT_ENV -u PYTHONPATH -u PROJ_LIB -u PROJ_DATA -u GDAL_DATA "${GITHUB_WORKSPACE}/smoke/relocated/geodepot/geodepot" add wippolder "${GITHUB_WORKSPACE}/tests/data/sources/wippolder/wippolder.gpkg"

      - if: runner.os == 'Windows'
        name: Smoke test bundle Windows
        run: |
          Remove-Item -Recurse -Force smoke\relocated -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force smoke\relocated | Out-Null
          Copy-Item -Recurse dist\geodepot smoke\relocated\geodepot
          Remove-Item -Recurse -Force smoke\repo -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force smoke\repo | Out-Null
          & "$env:GITHUB_WORKSPACE\smoke\relocated\geodepot\geodepot.cmd" --help
          Push-Location smoke\repo
          & "$env:GITHUB_WORKSPACE\smoke\relocated\geodepot\geodepot.cmd" init
          & "$env:GITHUB_WORKSPACE\smoke\relocated\geodepot\geodepot.cmd" add wippolder "$env:GITHUB_WORKSPACE\tests\data\sources\wippolder\wippolder.gpkg"
          Pop-Location

      - if: runner.os == 'Linux'
        name: Create package archive Linux
        run: |
          cd dist
          zip -r "geodepot-${{ matrix.platform_id }}-${GEODEPOT_ARCH}.zip" geodepot
          sha256sum "geodepot-${{ matrix.platform_id }}-${GEODEPOT_ARCH}.zip" > "geodepot-${{ matrix.platform_id }}-${GEODEPOT_ARCH}.zip.sha256sum"
          rm -rf geodepot environment.tar

      - if: runner.os == 'macOS'
        name: Create package archive macOS
        run: |
          cd dist
          zip -r "geodepot-${{ matrix.platform_id }}-${GEODEPOT_ARCH}.zip" geodepot
          shasum -a 256 "geodepot-${{ matrix.platform_id }}-${GEODEPOT_ARCH}.zip" > "geodepot-${{ matrix.platform_id }}-${GEODEPOT_ARCH}.zip.sha256sum"
          rm -rf geodepot environment.tar

      - if: runner.os == 'Windows'
        name: Create package archive Windows
        run: |
          cd dist
          7z a "geodepot-${{ matrix.platform_id }}-${env:GEODEPOT_ARCH}.zip" geodepot
          certUtil -hashfile "geodepot-${{ matrix.platform_id }}-${env:GEODEPOT_ARCH}.zip" SHA256 > "geodepot-${{ matrix.platform_id }}-${env:GEODEPOT_ARCH}.zip.sha256sum"
          Remove-Item -Recurse -Force geodepot, environment.tar

      - name: List contents
        run: ls dist

      - name: Upload binaries to
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/*
          retention-days: 7

      - name: Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          if gh release view "$TAG" --repo 3DBAG/geodepot > /dev/null 2>&1; then
            gh release upload "$TAG" dist/* --repo 3DBAG/geodepot --clobber
          else
            gh release create "$TAG" dist/* --repo 3DBAG/geodepot --prerelease --title "$TAG" --generate-notes
          fi
