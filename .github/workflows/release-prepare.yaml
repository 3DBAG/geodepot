name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout develop
        uses: actions/checkout@v4
        with:
          ref: develop
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@v0.9.3
        with:
          manifest-path: pyproject.toml
          environments: dev
          activate-environment: dev
          locked: false

      - name: Bump version and update pyproject.toml + CHANGELOG
        run: pixi run -e dev bumpver update --${{ inputs.bump_type }} --no-push --no-tag

      - name: Update CHANGELOG with release date
        run: |
          python << 'EOF'
          import re
          from datetime import date

          # Read version from pyproject.toml
          with open("pyproject.toml", "r") as f:
              content = f.read()
              match = re.search(r'^version = "([^"]+)"', content, re.MULTILINE)
              version = match.group(1) if match else "unknown"

          # Update CHANGELOG: replace first [Unreleased] with versioned section
          today = date.today().isoformat()
          with open("CHANGELOG", "r") as f:
              changelog = f.read()

          # Replace first occurrence: ## [Unreleased] -> ## [Unreleased]\n\n## [VERSION] - DATE
          changelog = changelog.replace(
              "## [Unreleased]",
              f"## [Unreleased]\n\n## [{version}] - {today}",
              1
          )

          with open("CHANGELOG", "w") as f:
              f.write(changelog)

          print(f"Updated CHANGELOG for version {version} - {today}")
          EOF

      - name: Regenerate pixi.lock with new version
        run: pixi install

      - name: Stage and amend bump commit
        run: |
          git add CHANGELOG pixi.lock
          # Only amend if there are changes to stage
          git diff --staged --quiet || git commit --amend --no-edit

      - name: Push develop
        run: git push origin develop

      - name: Create Pull Request to main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(grep '^version = ' pyproject.toml | head -1 | cut -d'"' -f2)
          BODY=$(cat << 'EOF'
          ## Release vVERSION

          This PR prepares the release of version VERSION.

          ### Changes included
          - Version bumped to VERSION
          - CHANGELOG updated with release date
          - pixi.lock regenerated to match new version

          ### Next steps
          After this PR is merged to main, the release tag will be created automatically, which will trigger the package build and GitHub release creation.
          EOF
          )
          BODY="${BODY//VERSION/$VERSION}"
          gh pr create \
            --base main \
            --head develop \
            --title "Release v${VERSION}" \
            --body "$BODY"
